services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binance_scalping_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-binance_scalping_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: Binance Scalping Bot
      APP_ENV: ${BACKEND_APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/binance_scalping_bot}
      EXECUTION_ENABLED: ${BACKEND_EXECUTION_ENABLED:-false}
      DEMO_TRADING_MODE: ${BACKEND_DEMO_TRADING_MODE:-true}
      SCANNER_INTERVAL_SECONDS: 30
      RISK_PER_TRADE: 0.01
      MAXIMUM_OPEN_TRADES: 3
      DAILY_LOSS_LIMIT: 0.03
      EMERGENCY_STOP: ${BACKEND_EMERGENCY_STOP:-false}
      MARKET_DATA_COLLECTION_ENABLED: ${BACKEND_MARKET_DATA_COLLECTION_ENABLED:-false}
      BINANCE_MARKET_DATA_BASE_URL: https://api.binance.com
      BINANCE_MARKET_DATA_TIMEOUT_SECONDS: 5
      BINANCE_MARKET_DATA_MAX_RETRIES: 2
      BINANCE_MARKET_DATA_BACKOFF_SECONDS: 0.25
      MARKET_DATA_SYMBOL_REFRESH_SECONDS: 3600
      MARKET_DATA_CYCLE_INTERVAL_SECONDS: 60
      MARKET_DATA_SYMBOLS: BTCUSDT,ETHUSDT
      REGIME_MINIMUM_CANDLES: 60
      REGIME_TREND_STRENGTH_THRESHOLD: 20
      REGIME_ATR_PERCENT_MIN: 0.02
      REGIME_ATR_PERCENT_MAX: 2.5
      REGIME_REALIZED_VOLATILITY_MAX: 3
      REGIME_ABNORMAL_CANDLE_PERCENT: 5
      REGIME_VOLUME_SPIKE_MULTIPLIER: 4
      REGIME_MAX_SPREAD_BPS: 15
      REGIME_EMA_SLOPE_THRESHOLD: 0.001
      REGIME_RANGE_COMPRESSION_THRESHOLD: 1
      REGIME_BTC_BLOCK_VOLATILITY_PERCENT: 3
      REGIME_CACHE_SECONDS: 30
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

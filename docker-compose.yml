services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binance_scalping_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-binance_scalping_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: Binance Scalping Bot
      APP_ENV: ${BACKEND_APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/binance_scalping_bot}
      EXECUTION_ENABLED: ${BACKEND_EXECUTION_ENABLED:-false}
      DEMO_TRADING_MODE: ${BACKEND_DEMO_TRADING_MODE:-false}
      BINANCE_FUTURES_DEMO_API_KEY: ${BACKEND_BINANCE_FUTURES_DEMO_API_KEY:-}
      BINANCE_FUTURES_DEMO_API_SECRET: ${BACKEND_BINANCE_FUTURES_DEMO_API_SECRET:-}
      BINANCE_RECV_WINDOW: ${BACKEND_BINANCE_RECV_WINDOW:-5000}
      BINANCE_FUTURES_DEMO_BASE_URL: ${BACKEND_BINANCE_FUTURES_DEMO_BASE_URL:-https://demo-fapi.binance.com}
      BINANCE_FUTURES_DEMO_MARKET_DATA_URL: ${BACKEND_BINANCE_FUTURES_DEMO_MARKET_DATA_URL:-https://demo-fapi.binance.com}
      SCANNER_INTERVAL_SECONDS: 30
      RISK_PER_TRADE: 0.01
      MAXIMUM_OPEN_TRADES: 3
      DAILY_LOSS_LIMIT: 0.03
      EMERGENCY_STOP: ${BACKEND_EMERGENCY_STOP:-false}
      MARKET_DATA_COLLECTION_ENABLED: ${BACKEND_MARKET_DATA_COLLECTION_ENABLED:-false}
      BINANCE_MARKET_DATA_TIMEOUT_SECONDS: 5
      BINANCE_MARKET_DATA_MAX_RETRIES: 2
      BINANCE_MARKET_DATA_BACKOFF_SECONDS: 0.25
      MARKET_DATA_SYMBOL_REFRESH_SECONDS: 3600
      MARKET_DATA_CYCLE_INTERVAL_SECONDS: 60
      MARKET_DATA_SYMBOLS: BTCUSDT,ETHUSDT
      REGIME_MINIMUM_CANDLES: 60
      REGIME_TREND_STRENGTH_THRESHOLD: 20
      REGIME_ATR_PERCENT_MIN: 0.02
      REGIME_ATR_PERCENT_MAX: 2.5
      REGIME_REALIZED_VOLATILITY_MAX: 3
      REGIME_ABNORMAL_CANDLE_PERCENT: 5
      REGIME_VOLUME_SPIKE_MULTIPLIER: 4
      REGIME_MAX_SPREAD_BPS: 15
      REGIME_EMA_SLOPE_THRESHOLD: 0.001
      REGIME_RANGE_COMPRESSION_THRESHOLD: 1
      REGIME_BTC_BLOCK_VOLATILITY_PERCENT: 3
      REGIME_CACHE_SECONDS: 30
      STRATEGY_ENABLED: true
      STRATEGY_VERSION: trend-pullback-v1
      STRATEGY_SUPPORTED_TRADING_MODE: futures_demo
      STRATEGY_ENTRY_TIMEFRAME: 1m
      STRATEGY_CONFIRMATION_TIMEFRAME: 5m
      STRATEGY_CONTEXT_TIMEFRAME: 15m
      STRATEGY_MINIMUM_CANDLE_HISTORY: 80
      STRATEGY_EMA_FAST_PERIOD: 20
      STRATEGY_EMA_MID_PERIOD: 50
      STRATEGY_EMA_SLOW_PERIOD: 200
      STRATEGY_EMA_SLOPE_LOOKBACK: 5
      STRATEGY_MINIMUM_BULLISH_EMA_SLOPE: 0.001
      STRATEGY_MINIMUM_IMPULSE_PERCENT: 0.35
      STRATEGY_IMPULSE_LOOKBACK: 20
      STRATEGY_MINIMUM_PULLBACK_PERCENT: 0.08
      STRATEGY_MAXIMUM_PULLBACK_PERCENT: 1.2
      STRATEGY_MAXIMUM_PULLBACK_CANDLES: 12
      STRATEGY_MAXIMUM_DISTANCE_FROM_EMA20_PERCENT: 0.35
      STRATEGY_MAXIMUM_DISTANCE_FROM_EMA50_PERCENT: 0.75
      STRATEGY_ENTRY_ZONE_ATR_TOLERANCE: 0.25
      STRATEGY_MINIMUM_REJECTION_BODY_RATIO: 0.45
      STRATEGY_MINIMUM_REJECTION_WICK_RATIO: 0.25
      STRATEGY_VOLUME_LOOKBACK: 20
      STRATEGY_MINIMUM_RECOVERY_VOLUME_RATIO: 1.2
      STRATEGY_PULLBACK_VOLUME_CONTRACTION_THRESHOLD: 0.95
      STRATEGY_LIQUIDITY_SWEEP_MODE: optional
      STRATEGY_LIQUIDITY_SWEEP_LOOKBACK: 12
      STRATEGY_MINIMUM_SWEEP_DEPTH_PERCENT: 0.03
      STRATEGY_MSS_MODE: optional
      STRATEGY_MSS_SWING_LOOKBACK: 8
      STRATEGY_MINIMUM_MSS_BREAK_PERCENT: 0.03
      STRATEGY_STOP_LOSS_ATR_BUFFER: 0.2
      STRATEGY_MINIMUM_STOP_PERCENT: 0.05
      STRATEGY_MAXIMUM_STOP_PERCENT: 1.25
      STRATEGY_MINIMUM_REWARD_TO_RISK: 1.5
      STRATEGY_MAXIMUM_SETUP_AGE_SECONDS: 900
      STRATEGY_MAXIMUM_PRICE_DISTANCE_AFTER_ZONE_PERCENT: 0.6
      STRATEGY_MAXIMUM_SPREAD_BPS: 12
      STRATEGY_CACHE_TTL_SECONDS: 15
      STRATEGY_PERSISTENCE_ENABLED: true
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-binance_scalping_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-binance_scalping_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: Binance Scalping Bot
      APP_ENV: ${BACKEND_APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/binance_scalping_bot}
      EXECUTION_ENABLED: ${BACKEND_EXECUTION_ENABLED:-false}
      DEMO_TRADING_MODE: ${BACKEND_DEMO_TRADING_MODE:-true}
      SCANNER_INTERVAL_SECONDS: 30
      RISK_PER_TRADE: 0.01
      MAXIMUM_OPEN_TRADES: 3
      DAILY_LOSS_LIMIT: 0.03
      EMERGENCY_STOP: ${BACKEND_EMERGENCY_STOP:-false}
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
